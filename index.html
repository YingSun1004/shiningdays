<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Shining Days — a one-photo-a-day picture diary</title>
<style>
  :root { --bg:#FDF8E2; --card:#FFFDF4; --text:#504E76; --accent:#F1642E; --gold:#F2C94C; --lilac:#C4C3E3; }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:Georgia,'Times New Roman',serif; min-height:100vh; display:flex; align-items:center; justify-content:center; padding:2rem 1rem; text-align:center; }
  main { max-width:480px; background:var(--card); border-radius:24px; padding:3rem 2rem; box-shadow:0 2px 24px rgba(242,201,76,0.35); }
  .star { font-size:3rem; color:var(--gold); display:block; margin-bottom:1rem; }
  h1 { font-size:2rem; margin-bottom:0.5rem; }
  .tagline { opacity:0.75; margin-bottom:2rem; }
  p { line-height:1.7; margin-bottom:1.5rem; }
  a.button { display:inline-block; background:var(--lilac); color:var(--text); text-decoration:none; padding:0.6rem 1.6rem; border-radius:999px; box-shadow:0 2px 10px rgba(242,201,76,0.45); }
</style>
</head>
<body>
<main>
  <span class="star">★</span>
  <h1>Shining Days</h1>
  <p class="tagline">Every ordinary day deserves to shine.</p>
  <p>A one-photo-a-day picture diary for iPhone. No accounts, no streaks, no pressure — watch your month quietly become a little book.</p>
  <a class="button" href="privacy.html">Privacy Policy</a>
</main>
</body>
</html>
